<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Pasien - Klinik Sehat</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        input, button { padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        button { cursor: pointer; background-color: #27ae60; color: white; border: none; font-weight: bold; }
        button:hover { background-color: #219150; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Manajemen Data Pasien</h2>
    
    <form id="patientForm">
        <input type="text" id="nama" placeholder="Nama Lengkap" required>
        <input type="number" id="umur" placeholder="Umur" required>
        <input type="text" id="diagnosa" placeholder="Diagnosa" required>
        <button type="submit">Tambah Pasien</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Diagnosa</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="patientTableBody"></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
